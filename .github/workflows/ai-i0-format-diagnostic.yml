name: AI-I0 Format Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12
      - run: bun install --frozen-lockfile
      - run: |
          bunx prettier --write \
            lib/ai/architecture/contracts.ts \
            lib/ai/architecture/architecture.test.ts
          git diff -- \
            lib/ai/architecture/contracts.ts \
            lib/ai/architecture/architecture.test.ts > ai-i0-format.patch
      - uses: actions/upload-artifact@v4
        with:
          name: ai-i0-format-output
          path: |
            lib/ai/architecture/contracts.ts
            lib/ai/architecture/architecture.test.ts
            ai-i0-format.patch
          if-no-files-found: error
          retention-days: 1
