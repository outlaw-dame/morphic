name: AI-I1 CI Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Capture typecheck
        run: |
          bun typecheck > typecheck-report.txt 2>&1 || true
      - name: Capture lint
        run: |
          bun lint > lint-report.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: ai-i1-ci-diagnostics
          path: |
            typecheck-report.txt
            lint-report.txt
          if-no-files-found: error
          retention-days: 1
