name: AI-I1 Final Autofix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fixes:
    if: github.head_ref == 'agent/ai-i1-model-role-selection-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i1-model-role-selection-v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12
      - run: bun install --frozen-lockfile
      - name: Apply exact lint and formatting fixes
        run: |
          bunx eslint --fix \
            lib/models/model-registry-v2.ts \
            lib/models/role-selection-v2.ts
          bunx prettier --write \
            lib/models/model-registry-v2.ts \
            lib/models/role-selection-v2.ts \
            lib/models/role-profiles-v2.ts
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/ai-i1-error-artifact.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/models/model-registry-v2.ts lib/models/role-selection-v2.ts lib/models/role-profiles-v2.ts .github/workflows/ai-i1-error-artifact.yml
          git commit -m "apply final AI-I1 lint and type fixes"
          git push origin HEAD:agent/ai-i1-model-role-selection-v2
