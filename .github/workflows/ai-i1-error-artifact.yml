name: AI-I1 Fix Artifact

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  fixes:
    if: github.head_ref == 'agent/ai-i1-model-role-selection-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12
      - run: bun install --frozen-lockfile
      - name: Apply exact lint and formatting fixes
        run: |
          bunx eslint --fix \
            lib/models/model-registry-v2.ts \
            lib/models/role-selection-v2.ts
          bunx prettier --write \
            lib/models/model-registry-v2.ts \
            lib/models/role-selection-v2.ts \
            lib/models/role-profiles-v2.ts
      - uses: actions/upload-artifact@v4
        with:
          name: ai-i1-fixes
          path: |
            lib/models/model-registry-v2.ts
            lib/models/role-selection-v2.ts
            lib/models/role-profiles-v2.ts
          if-no-files-found: error
          retention-days: 1
