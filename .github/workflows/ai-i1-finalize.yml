name: AI-I1 Finalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i1-model-role-selection-v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Apply exact lint and format fixes
        run: |
          bunx eslint --fix \
            lib/models/model-registry-v2.ts \
            lib/models/role-selection-v2.ts
          bunx prettier --write \
            lib/models/model-registry-v2.ts \
            lib/models/role-selection-v2.ts \
            lib/models/role-profiles-v2.ts
      - name: Remove temporary diagnostics
        run: |
          rm -f \
            .github/workflows/ai-i1-ci-diagnostic.yml \
            .github/workflows/ai-i1-error-artifact.yml \
            .github/workflows/ai-i1-finalize.yml
      - name: Commit finalized AI-I1 branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'finalize AI-I1 CI fixes and remove diagnostics'
          git push origin HEAD:agent/ai-i1-model-role-selection-v2
