name: AI-I1 Format Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i1-model-role-selection-v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12
      - run: bun install --frozen-lockfile
      - run: |
          bunx prettier --write \
            lib/models/role-selection-v2.ts \
            lib/models/role-selection-v2.test.ts
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/models/role-selection-v2.ts lib/models/role-selection-v2.test.ts
          git commit -m 'format AI-I1 role selection files'
          git push origin HEAD:agent/ai-i1-model-role-selection-v2
