name: AI-I2 Final Type Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/ai-i2-hardened-role-runner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i2-hardened-role-runner
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Apply explicit selected-state and promise typing
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          runner = Path('lib/ai/role-runner.ts')
          text = runner.read_text()
          pattern = re.compile(r"(\n\s*}\s*else\s*\{\n)(\s*)let attempt = 1", re.MULTILINE)
          replacement = (
              r"\1\2if (selection.status !== 'selected' || selection.candidate === null) {\n"
              r"\2  return fail('no_eligible_model', ['no_eligible_model'])\n"
              r"\2}\n"
              r"\2const selectedCandidate = selection.candidate\n"
              r"\2let attempt = 1"
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'selected branch substitution count: {count}')
          text, provider_count = re.subn(
              r"providerId: selection\.candidate\.providerId,\n(\s*)modelId: selection\.candidate\.modelId,",
              r"providerId: selectedCandidate.providerId,\n\1modelId: selectedCandidate.modelId,",
              text,
              count=1,
          )
          if provider_count != 1:
              raise SystemExit(f'candidate substitution count: {provider_count}')
          runner.write_text(text)

          tests = Path('lib/ai/role-runner.test.ts')
          test_text = tests.read_text()
          test_text, mock_count = re.subn(
              r"invoke: vi\.fn\(\(\) => new Promise\(\(\) => undefined\)\)",
              """invoke: vi.fn(
                () =>
                  new Promise<Readonly<{ output: unknown; outputTokens: number }>>(
                    () => undefined
                  )
              )""",
              test_text,
              count=1,
          )
          if mock_count != 1:
              raise SystemExit(f'promise substitution count: {mock_count}')
          tests.write_text(test_text)
          PY
      - name: Validate focused changes
        run: |
          bunx prettier --write lib/ai/role-runner.ts lib/ai/role-runner.test.ts
          bunx eslint lib/ai/role-runner.ts lib/ai/role-runner.test.ts
          bun typecheck
      - name: Remove temporary workflow
        run: rm .github/workflows/ai-i2-final-type-fix.yml
      - name: Commit validated fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(ai): finalize AI-I2 strict type safety"
          git push origin HEAD:agent/ai-i2-hardened-role-runner
