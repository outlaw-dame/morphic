name: AI-I2 Finalize Valid

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/ai-i2-hardened-role-runner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i2-hardened-role-runner
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Apply AI-I2 fixes and registry evidence
        run: echo '' | base64 -d | python
      - name: Format and lint AI-I2 files
        run: |
          bunx eslint --fix lib/ai/role-runner.ts lib/ai/role-runner.test.ts
          bunx prettier --write \
            lib/ai/role-runner.ts \
            lib/ai/role-runner.test.ts \
            lib/ai/architecture/phase-registry.ts \
            docs/AI_PHASE_I2_COMMON_HARDENED_ROLE_RUNNER.md
      - name: Remove this temporary workflow
        run: rm .github/workflows/ai-i2-finalize-valid.yml
      - name: Commit finalized branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore(ai): finalize AI-I2 phase"
          git push origin HEAD:agent/ai-i2-hardened-role-runner
