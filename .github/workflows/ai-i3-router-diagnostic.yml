name: AI-I3 Router Diagnostic

on:
  push:
    branches:
      - agent/ai-i3-live-router-admission

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.head_commit.message != 'chore(ai): record AI-I3 diagnostics'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i3-live-router-admission
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Capture exact diagnostics and formatter output
        shell: bash
        run: |
          set +e
          mkdir -p .ai-i3-diagnostics
          bun run typecheck > .ai-i3-diagnostics/typecheck.txt 2>&1
          echo $? > .ai-i3-diagnostics/typecheck-exit.txt
          bun run lint > .ai-i3-diagnostics/lint.txt 2>&1
          echo $? > .ai-i3-diagnostics/lint-exit.txt
          bunx prettier --write \
            docs/AI_PHASE_I3A_ROUTER_ADMISSION_CORE.md \
            lib/ai/router/router-admission.ts \
            lib/ai/router/router-admission.test.ts \
            lib/ai/router/router.ts \
            lib/ai/schemas/route.ts
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .ai-i3-diagnostics \
            docs/AI_PHASE_I3A_ROUTER_ADMISSION_CORE.md \
            lib/ai/router/router-admission.ts \
            lib/ai/router/router-admission.test.ts \
            lib/ai/router/router.ts \
            lib/ai/schemas/route.ts
          git commit -m 'chore(ai): record AI-I3 diagnostics'
          git push origin HEAD:agent/ai-i3-live-router-admission
