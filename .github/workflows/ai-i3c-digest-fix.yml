name: AI-I3C Digest Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/ai-i3c-route-context-handoff'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/ai-i3c-route-context-handoff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unify Router digest production
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lib/ai/router/router-admission.ts')
          text = path.read_text()
          text = text.replace("import { createHash } from 'node:crypto'\n", '')
          marker = "} from '@/lib/ai/schemas'\n"
          replacement = marker + "\nimport { digestRoutePlan } from './execution-context'\n"
          if marker not in text:
              raise SystemExit('schema import marker missing')
          text = text.replace(marker, replacement, 1)
          old = "\nfunction digestRoute(route: CanonicalRoutePlan): string {\n  return createHash('sha256').update(JSON.stringify(route)).digest('hex')\n}\n"
          if old not in text:
              raise SystemExit('legacy digest function missing')
          text = text.replace(old, '\n', 1)
          text = text.replace('routeDigest: digestRoute(floor)', 'routeDigest: digestRoutePlan(floor)')
          text = text.replace('routeDigest: digestRoute(routePlan)', 'routeDigest: digestRoutePlan(routePlan)')
          path.write_text(text)
          PY
          bunx prettier --write lib/ai/router/router-admission.ts lib/ai/router/execution-context.ts lib/ai/router/execution-context.test.ts
          bun typecheck
          bun run test -- lib/ai/router/execution-context.test.ts lib/ai/router/router-admission.test.ts

      - name: Remove temporary workflow and commit
        run: |
          git rm .github/workflows/ai-i3c-digest-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/ai/router/router-admission.ts lib/ai/router/execution-context.ts lib/ai/router/execution-context.test.ts
          git commit -m "fix(ai): canonicalize Router route digests"
          git push origin HEAD:agent/ai-i3c-route-context-handoff
