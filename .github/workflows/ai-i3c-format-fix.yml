name: AI-I3C Format Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/ai-i3c-route-context-handoff'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/ai-i3c-route-context-handoff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format AI-I3C files
        run: |
          bunx prettier --write \
            app/api/chat/route.ts \
            lib/agents/researcher.ts \
            lib/ai/router/execution-context.ts \
            lib/ai/router/execution-context.test.ts \
            lib/ai/router/router-admission.ts \
            lib/streaming/create-chat-stream-response.ts \
            lib/streaming/create-ephemeral-chat-stream-response.ts \
            lib/streaming/types.ts \
            lib/streaming/__tests__/create-ephemeral-chat-stream-response.test.ts \
            docs/AI_PHASE_I3C_ROUTE_CONTEXT_HANDOFF.md
          bun typecheck
          bun run test -- lib/ai/router/execution-context.test.ts lib/ai/router/router-admission.test.ts lib/streaming/__tests__/create-ephemeral-chat-stream-response.test.ts

      - name: Remove temporary workflow and commit
        run: |
          git rm .github/workflows/ai-i3c-format-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/api/chat/route.ts lib/agents/researcher.ts lib/ai/router/execution-context.ts lib/ai/router/execution-context.test.ts lib/ai/router/router-admission.ts lib/streaming/create-chat-stream-response.ts lib/streaming/create-ephemeral-chat-stream-response.ts lib/streaming/types.ts lib/streaming/__tests__/create-ephemeral-chat-stream-response.test.ts docs/AI_PHASE_I3C_ROUTE_CONTEXT_HANDOFF.md
          git commit -m "style(ai): format Router execution handoff"
          git push origin HEAD:agent/ai-i3c-route-context-handoff
