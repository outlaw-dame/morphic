name: AI-I3E Focused Diagnostic

on:
  push:
    branches:
      - agent/ai-i3e-two-stage-research-pipeline

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i3e-two-stage-research-pipeline
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12
      - run: bun install --frozen-lockfile
      - name: Capture focused test output
        shell: bash
        run: |
          set +e
          bunx vitest run lib/agents/coordinator/governed-research-pipeline.test.ts --reporter=verbose > ai-i3e-focused-test.log 2>&1
          echo "exit_code=$?" >> ai-i3e-focused-test.log
          exit 0
      - name: Commit diagnostic and remove workflow
        shell: bash
        run: |
          rm .github/workflows/ai-i3e-focused-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ai-i3e-focused-test.log .github/workflows/ai-i3e-focused-diagnostic.yml
          git commit -m "ci(ai): capture AI-I3E focused test failure"
          git push origin HEAD:agent/ai-i3e-two-stage-research-pipeline
