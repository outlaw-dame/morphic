name: AI-I3E Typecheck Diagnostic

on:
  push:
    branches:
      - agent/ai-i3e-two-stage-coordinator-pipeline

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i3e-two-stage-coordinator-pipeline
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Capture diagnostics
        run: |
          set +e
          bun run typecheck > AI_I3E_TYPECHECK.txt 2>&1
          status=$?
          echo "exit_status=$status" >> AI_I3E_TYPECHECK.txt
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add AI_I3E_TYPECHECK.txt
          git commit -m "chore(ci): record AI-I3E type diagnostics" || exit 0
          git push
