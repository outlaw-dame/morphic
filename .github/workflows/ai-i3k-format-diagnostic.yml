name: AI-I3K Format Finalizer

on:
  push:
    branches: [agent/ai-i3k-governed-stream-rollout]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i3k-governed-stream-rollout
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Format and remove finalizer
        run: |
          bunx prettier --write \
            app/api/chat/route.ts \
            docs/AI_PHASE_I3K_GOVERNED_STREAM_ROLLOUT.md \
            lib/ai/rollout/governed-stream-rollout.ts \
            lib/ai/rollout/governed-stream-rollout.test.ts \
            lib/streaming/types.ts \
            lib/streaming/create-chat-stream-response.ts \
            lib/streaming/create-ephemeral-chat-stream-response.ts \
            lib/streaming/__tests__/create-ephemeral-chat-stream-response.test.ts
          git rm .github/workflows/ai-i3k-format-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/api/chat/route.ts docs/AI_PHASE_I3K_GOVERNED_STREAM_ROLLOUT.md lib/ai/rollout lib/streaming
          git commit -m "style(ai): normalize AI-I3K rollout files"
          git push origin HEAD:agent/ai-i3k-governed-stream-rollout
