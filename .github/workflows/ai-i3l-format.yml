name: AI-I3L one-time formatter

on:
  push:
    branches:
      - agent/ai-i3l-governed-release-stream-response

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i3l-governed-release-stream-response
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Format permanent files
        run: >-
          bunx prettier --write
          lib/streaming/create-governed-release-stream-response.ts
          lib/streaming/create-governed-release-stream-response.test.ts
          docs/AI_PHASE_I3L_GOVERNED_RELEASE_STREAM_RESPONSE.md
      - name: Remove formatter workflow
        run: rm .github/workflows/ai-i3l-format.yml
      - name: Commit normalized files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/streaming/create-governed-release-stream-response.ts \
            lib/streaming/create-governed-release-stream-response.test.ts \
            docs/AI_PHASE_I3L_GOVERNED_RELEASE_STREAM_RESPONSE.md \
            .github/workflows/ai-i3l-format.yml
          git diff --cached --quiet && exit 0
          git commit -m "style(ai): normalize AI-I3L files"
          git push origin HEAD:agent/ai-i3l-governed-release-stream-response
