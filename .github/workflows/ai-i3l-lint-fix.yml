name: AI-I3L one-time lint fixer

on:
  push:
    branches:
      - agent/ai-i3l-governed-release-stream-response

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ai-i3l-governed-release-stream-response
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Apply lint and formatting fixes
        run: |
          bunx eslint --fix \
            lib/streaming/create-governed-release-stream-response.ts \
            lib/streaming/create-governed-release-stream-response.test.ts
          bunx prettier --write \
            lib/streaming/create-governed-release-stream-response.ts \
            lib/streaming/create-governed-release-stream-response.test.ts
      - name: Remove fixer workflow
        run: rm .github/workflows/ai-i3l-lint-fix.yml
      - name: Commit normalized files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/streaming/create-governed-release-stream-response.ts \
            lib/streaming/create-governed-release-stream-response.test.ts \
            .github/workflows/ai-i3l-lint-fix.yml
          git diff --cached --quiet && exit 0
          git commit -m "style(ai): apply AI-I3L lint fixes"
          git push origin HEAD:agent/ai-i3l-governed-release-stream-response
