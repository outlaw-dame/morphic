name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun lint

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type checking
        run: |
          bun typecheck 2>&1 | tee /tmp/typecheck.log
          exit ${PIPESTATUS[0]}
        shell: bash

      - name: Surface type errors
        if: failure()
        run: |
          echo '## TypeCheck failure' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/typecheck.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash

  format:
    runs-on: ubuntu-latest
    name: Format Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun format:check

  format-artifact:
    runs-on: ubuntu-latest
    name: AI-I3K Format Artifact

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format AI-I3K files
        run: bunx prettier --write lib/ai/runtime/production-role-runtime-config.ts lib/ai/runtime/production-role-runtime-config.test.ts docs/AI_PHASE_I3K_PRODUCTION_ROLE_RUNTIME.md

      - name: Upload AI-I3K formatted files
        uses: actions/upload-artifact@v4
        with:
          name: ai-i3k-formatted-files
          path: |
            lib/ai/runtime/production-role-runtime-config.ts
            lib/ai/runtime/production-role-runtime-config.test.ts
            docs/AI_PHASE_I3K_PRODUCTION_ROLE_RUNTIME.md
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    name: Test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "vitest.config.mts" ]; then
            bun run test 2>&1 | tee /tmp/test.log
            exit ${PIPESTATUS[0]}
          fi
        shell: bash
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DATABASE_RESTRICTED_URL: postgresql://user:pass@localhost:5432/db
          NODE_ENV: test

      - name: Surface test errors
        if: failure()
        run: |
          echo '## Test failure' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash

  native-verify:
    runs-on: ubuntu-latest
    name: Native Config Verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Capacitor config
        run: bun run cap:verify

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [lint, typecheck, format, test, native-verify]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
