name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun lint

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type checking
        run: |
          bun typecheck 2>&1 | tee /tmp/typecheck.log
          exit ${PIPESTATUS[0]}
        shell: bash

      - name: Surface type errors
        if: failure()
        run: |
          echo '## TypeCheck failure' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/typecheck.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash

  format:
    runs-on: ubuntu-latest
    name: Format Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate completed AI-I6 registry
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/ai/architecture/phase-registry.ts')
          text = path.read_text()
          old = """    phase({
                id: 'AI-I6',
                title: 'Evidence ingestion completeness',
                dependencies: ['AI-I0', 'AI-I5'],
                requiredRoles: ['coordinator'],
                historicalRequirements: [
                  carried(
                    'Original AI-7 Evidence Graph',
                    'Existing normalization and conflict work must cover every evidence-producing path.',
                    'completed_but_not_integrated'
                  )
                ]
              }),"""
          new = """    phase({
                id: 'AI-I6',
                title: 'Evidence ingestion completeness',
                status: 'integrated',
                dependencies: ['AI-I0', 'AI-I5'],
                requiredRoles: ['coordinator'],
                historicalRequirements: [
                  carried(
                    'Original AI-7 Evidence Graph',
                    'Normalization, route-bound provenance, deduplication, claim extraction, and conflict analysis now cover every current retrieval evidence path.',
                    'completed_and_retained'
                  )
                ],
                evidence: [
                  {
                    kind: 'document',
                    reference: 'docs/AI_PHASE_I6_EVIDENCE_INGESTION_COMPLETENESS.md'
                  },
                  {
                    kind: 'code',
                    reference: 'lib/ai-architecture/evidence/evidence-graph.ts'
                  },
                  {
                    kind: 'code',
                    reference:
                      'lib/ai-architecture/evidence/normalize-search-result.ts'
                  },
                  {
                    kind: 'code',
                    reference: 'lib/agents/coordinator/live-handoff.ts'
                  },
                  {
                    kind: 'test',
                    reference:
                      'lib/ai-architecture/evidence/evidence-ingestion.test.ts'
                  },
                  {
                    kind: 'test',
                    reference: 'lib/agents/coordinator/live-handoff.test.ts'
                  },
                  { kind: 'pull_request', reference: 'PR #107' }
                ]
              }),"""
          if old not in text:
              raise SystemExit('AI-I6 registry block not found exactly once')
          if text.count(old) != 1:
              raise SystemExit('AI-I6 registry block was not unique')
          path.write_text(text.replace(old, new))
          PY
          bunx prettier --write lib/ai/architecture/phase-registry.ts

      - name: Upload completed AI-I6 registry
        uses: actions/upload-artifact@v4
        with:
          name: ai-i6-completed-registry
          path: lib/ai/architecture/phase-registry.ts
          if-no-files-found: error
          retention-days: 1

      - name: Check formatting
        run: bun format:check

  test:
    runs-on: ubuntu-latest
    name: Test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "vitest.config.mts" ]; then
            bun run test 2>&1 | tee /tmp/test.log
            exit ${PIPESTATUS[0]}
          fi
        shell: bash
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DATABASE_RESTRICTED_URL: postgresql://user:pass@localhost:5432/db
          NODE_ENV: test

      - name: Surface test errors
        if: failure()
        run: |
          echo '## Test failure' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash

  native-verify:
    runs-on: ubuntu-latest
    name: Native Config Verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Capacitor config
        run: bun run cap:verify

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [lint, typecheck, format, test, native-verify]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
