name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  router-finalize:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/ai-i3-live-router-admission'
    runs-on: ubuntu-latest
    name: Router Finalize

    steps:
      - name: Checkout Router branch
        uses: actions/checkout@v4
        with:
          ref: agent/ai-i3-live-router-admission
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply exact lint and format fixes
        run: |
          bunx eslint --fix \
            lib/ai/router/router-admission.ts \
            lib/ai/router/router-admission.test.ts \
            lib/ai/router/router.ts \
            lib/ai/schemas/route.ts
          bunx prettier --write \
            docs/AI_PHASE_I3A_ROUTER_ADMISSION_CORE.md \
            lib/ai/router/router-admission.ts \
            lib/ai/router/router-admission.test.ts \
            lib/ai/router/router.ts \
            lib/ai/schemas/route.ts

      - name: Restore permanent CI workflow and commit
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -rf .ai-i3-diagnostics
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore(ai): normalize Router admission core'
          git push origin HEAD:agent/ai-i3-live-router-admission

  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun lint

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type checking
        run: |
          bun typecheck 2>&1 | tee /tmp/typecheck.log
          exit ${PIPESTATUS[0]}
        shell: bash

      - name: Surface type errors
        if: failure()
        run: |
          echo '## TypeCheck failure' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/typecheck.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash

  format:
    runs-on: ubuntu-latest
    name: Format Check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun format:check

  test:
    runs-on: ubuntu-latest
    name: Test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "vitest.config.mts" ]; then
            bun run test 2>&1 | tee /tmp/test.log
            exit ${PIPESTATUS[0]}
          fi
        shell: bash
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DATABASE_RESTRICTED_URL: postgresql://user:pass@localhost:5432/db
          NODE_ENV: test

      - name: Surface test errors
        if: failure()
        run: |
          echo '## Test failure' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        shell: bash

  native-verify:
    runs-on: ubuntu-latest
    name: Native Config Verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Capacitor config
        run: bun run cap:verify

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [lint, typecheck, format, test, native-verify]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
